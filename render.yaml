services:
  - type: web
    name: evolution-api-willex
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      - key: SERVER_TYPE
        value: http
      - key: SERVER_PORT
        value: "8080"
      - key: SERVER_URL
        fromService:
          name: evolution-api-willex
          type: web
          property: host
      - key: AUTHENTICATION_TYPE
        value: apikey
      - key: AUTHENTICATION_API_KEY
        generateValue: true
      - key: DATABASE_ENABLED
        value: "true"
      - key: DATABASE_PROVIDER
        value: postgresql
      - key: DATABASE_CONNECTION_URI
        fromDatabase:
          name: evolution-db
          property: connectionString
      - key: DATABASE_CONNECTION_CLIENT_NAME
        value: evolution_api
      - key: DATABASE_SAVE_DATA_INSTANCE
        value: "true"
      - key: CACHE_REDIS_ENABLED
        value: "false"
      - key: CACHE_LOCAL_ENABLED
        value: "true"
      - key: WEBHOOK_GLOBAL_ENABLED
        value: "false"

databases:
  - name: evolution-db
    plan: free
    ipAllowList: []
